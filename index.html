<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yunene GRIDSHOT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #0d1117;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: #ffffff;
        }
        #canvas-container {
            width: 100%; height: 100%; position: absolute;
            top: 0; left: 0; z-index: 1;
        }
        
        /* HUD Style */
        #hud {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 50px;
            background: rgba(13, 17, 23, 0.9); padding: 15px 50px;
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px); pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .hud-item { text-align: center; }
        .hud-label {
            font-size: 12px; text-transform: uppercase; letter-spacing: 2px;
            color: #8b949e; margin-bottom: 5px;
        }
        .hud-value {
            font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums;
            color: #58a6ff;
        }
        #time-value { color: #ff7b72; }
        
        /* Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; transform: translate(-50%, -50%);
            z-index: 5; pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: #00ff00;
        }
        #crosshair::before { top: 3px; left: -2px; width: 12px; height: 2px; }
        #crosshair::after { top: -2px; left: 3px; width: 2px; height: 12px; }

        /* Menu Overlay */
        #menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20; background: rgba(1, 4, 9, 0.85);
            display: flex; justify-content: center; align-items: flex-start;
            backdrop-filter: blur(8px); transition: opacity 0.3s ease;
            overflow-y: auto; padding: 40px 0;
        }
        .menu-card {
            background: #161b22; padding: 35px; border-radius: 16px;
            border: 1px solid #30363d; width: 480px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9); margin: auto;
        }
        h1 {
            font-size: 26px; margin-bottom: 25px; letter-spacing: 1px;
            color: #ffffff; font-weight: 900;
        }
        
        /* Result & Ranking Registration */
        .result-container {
            display: none; margin-bottom: 25px; background: #0d1117;
            padding: 18px; border-radius: 8px; border-left: 4px solid #58a6ff;
            text-align: left;
        }
        .result-row {
            display: flex; justify-content: space-between; margin-bottom: 10px;
            font-size: 16px; color: #c9d1d9;
        }
        .result-row:last-child { margin-bottom: 0; }
        .result-val { font-weight: 800; color: #58a6ff; }
        
        .register-group { display: none; margin-top: 15px; border-top: 1px dashed #30363d; padding-top: 15px;}
        .register-group input { width: 100%; margin-bottom: 10px; }
        
        /* Settings Sections */
        .setting-section {
            background: #21262d; border: 1px solid #30363d; border-radius: 10px;
            padding: 20px; margin-bottom: 20px; text-align: left;
        }
        .section-title {
            font-size: 14px; font-weight: 700; color: #58a6ff; margin-bottom: 15px;
            border-bottom: 1px solid #30363d; padding-bottom: 5px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .input-group { margin-bottom: 15px; }
        .input-group:last-child { margin-bottom: 0; }
        label { display: block; font-size: 13px; color: #c9d1d9; margin-bottom: 6px; font-weight: 600; }
        
        input[type="text"], input[type="number"] {
            width: 100%; padding: 10px 14px; background: #0d1117;
            border: 1px solid #30363d; border-radius: 6px; color: #fff;
            font-size: 15px; font-weight: 700; outline: none; transition: all 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus { border-color: #58a6ff; }
        
        /* Buttons */
        .btn {
            width: 100%; padding: 16px; background: #238636; border: none;
            border-radius: 8px; color: white; font-size: 18px; font-weight: 800;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            margin-bottom: 10px;
        }
        .btn:hover { background: #2ea043; }
        .btn:active { transform: scale(0.98); }
        .btn-secondary { background: #1f6feb; font-size: 16px; padding: 12px; }
        .btn-secondary:hover { background: #388bfd; }
        .btn:disabled { background: #484f58; cursor: not-allowed; transform: none; }

        /* UI Selectors (Radio Tabs) */
        .radio-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .radio-label {
            flex: 1; display: block; text-align: center; background: #0d1117;
            border: 1px solid #30363d; padding: 10px; border-radius: 6px;
            cursor: pointer; font-size: 13px; font-weight: 600; color: #8b949e;
            transition: all 0.2s;
        }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .radio-label {
            background: #1f6feb; border-color: #58a6ff; color: #ffffff;
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.2);
        }

        /* Leaderboard Tabs */
        .lb-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .lb-tab {
            flex: 1; padding: 8px; background: #0d1117; border: 1px solid #30363d;
            border-radius: 6px; color: #8b949e; font-size: 12px; font-weight: 700;
            cursor: pointer; transition: 0.2s;
        }
        .lb-tab.active { background: #58a6ff; color: #0d1117; border-color: #58a6ff; }
        
        .slider-container { display: flex; align-items: center; gap: 15px; }
        input[type="range"] { flex: 1; -webkit-appearance: none; background: #0d1117; height: 6px; border-radius: 3px; outline: none; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: #58a6ff; cursor: pointer; transition: transform 0.1s;
        }
        .vol-value { font-size: 13px; font-weight: 700; color: #8b949e; min-width: 35px; text-align: right; }
        
        /* Leaderboard List */
        .leaderboard-list { max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .leaderboard-list::-webkit-scrollbar { width: 6px; }
        .leaderboard-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
        .rank-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px; background: #0d1117; border-radius: 6px;
            margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05);
        }
        .rank-item:nth-child(1) .r-pos { color: #f1c40f; font-size: 18px; text-shadow: 0 0 5px rgba(241,196,15,0.5); }
        .rank-item:nth-child(2) .r-pos { color: #bdc3c7; }
        .rank-item:nth-child(3) .r-pos { color: #cd7f32; }
        .r-left { display: flex; align-items: center; gap: 12px; }
        .r-pos { font-weight: 900; font-size: 16px; width: 20px; text-align: center; color: #8b949e; }
        .r-name { font-weight: 700; font-size: 14px; color: #e6edf3; }
        .r-right { text-align: right; }
        .r-score { font-weight: 800; color: #58a6ff; font-size: 15px; }
        .r-time { font-size: 11px; color: #6e7681; margin-top: 2px; }
        .empty-rank { text-align: center; color: #6e7681; font-size: 13px; padding: 20px 0; }
        .refresh-indicator { font-size: 10px; color: #2ea043; font-weight: normal; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        #instructions { margin-top: 15px; font-size: 12px; color: #8b949e; line-height: 1.6; text-align: center; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-item"><div class="hud-label">Time</div><div class="hud-value" id="time-value">60.0</div></div>
        <div class="hud-item"><div class="hud-label">Score</div><div class="hud-value" id="score-value">0</div></div>
        <div class="hud-item"><div class="hud-label">Accuracy</div><div class="hud-value" id="accuracy-value">100%</div></div>
    </div>

    <div id="crosshair"></div>

    <div id="menu-overlay">
        <div class="menu-card">
            <h1 id="menu-title">GRIDSHOT TRAINER</h1>
            
            <div class="result-container" id="result-board">
                <div class="result-row"><span>Score</span><span class="result-val" id="res-score">0</span></div>
                <div class="result-row"><span>Hits</span><span class="result-val" id="res-hits">0</span></div>
                <div class="result-row"><span>Accuracy</span><span class="result-val" id="res-acc">100%</span></div>
                
                <div class="register-group" id="register-group">
                    <label for="nickname">기록을 랭킹에 남기세요!</label>
                    <input type="text" id="nickname" placeholder="닉네임 입력 (최대 10자)" maxlength="10">
                    <button class="btn btn-secondary" id="register-btn">서버에 랭킹 등록</button>
                </div>
            </div>

            <div class="setting-section">
                <div class="section-title">GAME SETTINGS</div>
                <div class="radio-group">
                    <div>
                        <input type="radio" id="diff-easy" name="difficulty" value="easy">
                        <label for="diff-easy" class="radio-label">쉬움</label>
                    </div>
                    <div>
                        <input type="radio" id="diff-normal" name="difficulty" value="normal">
                        <label for="diff-normal" class="radio-label">보통</label>
                    </div>
                    <div>
                        <input type="radio" id="diff-hard" name="difficulty" value="hard" checked>
                        <label for="diff-hard" class="radio-label">어려움</label>
                    </div>
                </div>
                <div class="input-group">
                    <label for="sensitivity">Valorant Sensitivity (발로란트 감도)</label>
                    <input type="number" id="sensitivity" value="0.3" step="0.01" min="0.01" max="10">
                </div>
            </div>

            <div class="setting-section">
                <div class="section-title">HIT SOUND SETTINGS</div>
                <div class="radio-group">
                    <div style="flex: 1;">
                        <input type="radio" id="sound-default" name="hit-sound" value="default" checked>
                        <label for="sound-default" class="radio-label">기본 사운드</label>
                    </div>
                    <div style="flex: 1;">
                        <input type="radio" id="sound-ding" name="hit-sound" value="ding">
                        <label for="sound-ding" class="radio-label">띵~</label>
                    </div>
                </div>
                <div class="input-group">
                    <label>효과음 볼륨 (Volume)</label>
                    <div class="slider-container">
                        <input type="range" id="volume-slider" min="0" max="100" value="50">
                        <span class="vol-value" id="vol-txt">50%</span>
                    </div>
                </div>
            </div>

            <div class="setting-section" id="leaderboard-section">
                <div class="section-title">
                    GLOBAL LEADERBOARD
                    <span class="refresh-indicator" id="sync-status">● 서버 동기화 중</span>
                </div>
                <div class="lb-tabs">
                    <button class="lb-tab" data-target-diff="easy">쉬움</button>
                    <button class="lb-tab" data-target-diff="normal">보통</button>
                    <button class="lb-tab active" data-target-diff="hard">어려움</button>
                </div>
                <div class="leaderboard-list" id="leaderboard-list">
                    <div class="empty-rank">데이터를 불러오는 중...</div>
                </div>
            </div>

            <button class="btn" id="start-btn">GAME START</button>
            <div id="instructions">마우스 좌클릭 : 사격 | ESC : 마우스 잠금 해제 및 일시정지</div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script type="module">
        // 1. Firebase SDK Imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // 2. 캡처 화면에 있던 Firebase 설정값 적용
        const firebaseConfig = {
            apiKey: "AIzaSyDZQkBXTuPRYH-WKQLjxPh7tFqoaA3DT2U",
            authDomain: "gridshot-trainer.firebaseapp.com",
            projectId: "gridshot-trainer",
            storageBucket: "gridshot-trainer.firebasestorage.app",
            messagingSenderId: "857178952384",
            appId: "1:857178952384:web:10d86fd47376c8fe7cd325",
            measurementId: "G-BJCYRM1EJE"
        };

        // 3. Firebase 및 데이터베이스 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 기존 게임 상태 및 변수 ---
        let score = 0, hits = 0, totalClicks = 0, timeLeft = 60.0;
        let isPlaying = false, gameTimer = null;
        let finalAcc = 100;
        let activeDifficulty = 'hard'; 
        let viewDifficulty = 'hard';   
        
        const TARGET_SIZES = { easy: 2.6, normal: 2.1, hard: 1.7 };
        const VALORANT_YAW_RADIAN = 0.07 * (Math.PI / 180);

        // --- 오디오 관리 ---
        const audioUrls = {
            default: "https://github.com/kmjgit/For-Yunene/raw/refs/heads/main/%EA%B8%B0%EB%B3%B8%20%ED%91%9C%EC%A0%81%20%ED%9A%A8%EA%B3%BC.mp3",
            ding: "https://github.com/kmjgit/For-Yunene/raw/refs/heads/main/%EC%9C%A0%EB%84%A4%EB%84%A4%20%EB%9D%B5.MP3"
        };
        const audioPool = { default: [], ding: [] };
        const POOL_SIZE = 5;
        
        for (let key in audioUrls) {
            for (let i = 0; i < POOL_SIZE; i++) {
                const audio = new Audio(audioUrls[key]);
                audio.preload = 'auto';
                audioPool[key].push(audio);
            }
        }
        let poolIndexes = { default: 0, ding: 0 };

        function playHitSound() {
            const selectedSound = document.querySelector('input[name="hit-sound"]:checked').value;
            const volume = parseFloat(document.getElementById('volume-slider').value) / 100;
            const index = poolIndexes[selectedSound];
            const audio = audioPool[selectedSound][index];
            
            audio.volume = volume;
            audio.currentTime = 0; 
            audio.play().catch(e => console.log("Audio block:", e));
            poolIndexes[selectedSound] = (index + 1) % POOL_SIZE;
        }

        const volSlider = document.getElementById('volume-slider');
        const volTxt = document.getElementById('vol-txt');
        volSlider.addEventListener('input', (e) => volTxt.innerText = e.target.value + '%');

        // --- UI 매핑 ---
        const menuOverlay = document.getElementById('menu-overlay');
        const startBtn = document.getElementById('start-btn');
        const scoreValue = document.getElementById('score-value');
        const accuracyValue = document.getElementById('accuracy-value');
        const timeValue = document.getElementById('time-value');
        const menuTitle = document.getElementById('menu-title');
        
        const resultBoard = document.getElementById('result-board');
        const resScore = document.getElementById('res-score');
        const resHits = document.getElementById('res-hits');
        const resAcc = document.getElementById('res-acc');
        
        const registerGroup = document.getElementById('register-group');
        const registerBtn = document.getElementById('register-btn');
        const nicknameInput = document.getElementById('nickname');
        const leaderboardList = document.getElementById('leaderboard-list');

        document.querySelectorAll('.lb-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                viewDifficulty = e.target.getAttribute('data-target-diff');
                fetchAndRenderLeaderboard(); 
            });
        });

        // --- 글로벌 서버 연동 함수 (Firestore 쿼리 적용) ---
        async function fetchGlobalRankings(difficulty) {
            try {
                const q = query(
                    collection(db, "rankings_" + difficulty), 
                    orderBy("score", "desc"), 
                    orderBy("hits", "desc"), 
                    limit(10)
                );
                
                const querySnapshot = await getDocs(q);
                const ranks = [];
                querySnapshot.forEach((doc) => {
                    ranks.push(doc.data());
                });
                return ranks;
            } catch (e) {
                console.error("랭킹 불러오기 실패: ", e);
                return [];
            }
        }

        async function saveGlobalRanking(nickname, finalScore, finalHits, finalAcc, difficulty) {
            try {
                await addDoc(collection(db, "rankings_" + difficulty), {
                    nickname: nickname || "Anonymous",
                    score: finalScore,
                    hits: finalHits,
                    acc: finalAcc,
                    timestamp: Date.now()
                });
                return true;
            } catch (e) {
                console.error("랭킹 등록 실패: ", e);
                return false;
            }
        }

        function timeSince(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return "방금 전";
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + "년 전";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + "개월 전";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "일 전";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "시간 전";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "분 전";
        }

        async function fetchAndRenderLeaderboard() {
            const syncStatus = document.getElementById('sync-status');
            syncStatus.style.color = '#f1c40f'; 
            
            const ranks = await fetchGlobalRankings(viewDifficulty);
            
            leaderboardList.innerHTML = '';
            
            if (ranks.length === 0) {
                leaderboardList.innerHTML = '<div class="empty-rank">등록된 랭킹이 없습니다.</div>';
            } else {
                const top10 = ranks.slice(0, 10);
                top10.forEach((r, index) => {
                    const item = document.createElement('div');
                    item.className = 'rank-item';
                    item.innerHTML = `
                        <div class="r-left">
                            <div class="r-pos">${index + 1}</div>
                            <div class="r-name">${r.nickname}</div>
                        </div>
                        <div class="r-right">
                            <div class="r-score">${r.score} <span style="font-size:11px; color:#8b949e;">(${r.acc}%)</span></div>
                            <div class="r-time">${timeSince(r.timestamp)}</div>
                        </div>
                    `;
                    leaderboardList.appendChild(item);
                });
            }
            syncStatus.style.color = '#2ea043'; 
        }

        setInterval(() => {
            if (!isPlaying && menuOverlay.style.display !== 'none') {
                fetchAndRenderLeaderboard();
            }
        }, 3000);

        fetchAndRenderLeaderboard(); 

        registerBtn.addEventListener('click', async () => {
            const nick = nicknameInput.value.trim();
            if(!nick) {
                alert("닉네임을 입력해주세요!");
                return;
            }
            
            registerBtn.innerText = "서버 전송 중...";
            registerBtn.disabled = true;
            
            await saveGlobalRanking(nick, score, hits, finalAcc, activeDifficulty);
            
            document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.lb-tab[data-target-diff="${activeDifficulty}"]`).classList.add('active');
            viewDifficulty = activeDifficulty;
            
            await fetchAndRenderLeaderboard();
            
            registerGroup.style.display = 'none'; 
            nicknameInput.value = '';
            registerBtn.innerText = "서버에 랭킹 등록";
        });

        // --- Three.js 초기화 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0d1117);

        const camera = new THREE.PerspectiveCamera(70.53, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ'; 
        camera.position.set(0, 1.7, 0); 

        function updateCameraFOV() {
            camera.aspect = window.innerWidth / window.innerHeight;
            const hFOV = 103; 
            camera.fov = 2 * Math.atan(Math.tan(hFOV * Math.PI / 360) / camera.aspect) * (180 / Math.PI);
            camera.updateProjectionMatrix();
        }

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        updateCameraFOV();

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 0.8, 100);
        pointLight.position.set(0, 10, -5);
        scene.add(pointLight);

        function createGridTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#161b22'; ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = '#30363d'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, 512, 512);
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(10, 10); 
            return tex;
        }

        const room = new THREE.Mesh(
            new THREE.BoxGeometry(40, 20, 40), 
            new THREE.MeshStandardMaterial({ map: createGridTexture(), side: THREE.BackSide, roughness: 0.8 })
        );
        room.position.set(0, 10, 0); 
        scene.add(room);

        // --- 타겟 생성 설정 ---
        const textureLoader = new THREE.TextureLoader();
        const targetMaterial = new THREE.MeshBasicMaterial({
            map: textureLoader.load("https://i.ibb.co/yn9FDhkc/2-1-removebg-preview.png"),
            transparent: true, side: THREE.DoubleSide
        });
        
        let targetGeometry; 
        const targets = [];
        const wallZ = -19.5; 
        
        const GRID_COLS = 3, GRID_SPACING_X = 3.2, GRID_SPACING_Y = 3.2, GRID_CENTER_Y = 4.5; 
        let activeGridPositions = [];
        let lastDestroyedPosition = -1;

        function getPositionFromIndex(index) {
            const col = (index % GRID_COLS) - 1;
            const row = Math.floor(index / GRID_COLS) - 1;
            return { x: col * GRID_SPACING_X, y: GRID_CENTER_Y + (row * GRID_SPACING_Y) };
        }

        function spawnTarget() {
            let availableSlots = [];
            for(let i = 0; i < 9; i++) {
                if(!activeGridPositions.includes(i) && i !== lastDestroyedPosition) availableSlots.push(i);
            }
            if(availableSlots.length === 0) {
                for(let i = 0; i < 9; i++) {
                    if(!activeGridPositions.includes(i)) availableSlots.push(i);
                }
            }

            const chosenSlot = availableSlots[Math.floor(Math.random() * availableSlots.length)];
            activeGridPositions.push(chosenSlot);
            const pos = getPositionFromIndex(chosenSlot);

            const mesh = new THREE.Mesh(targetGeometry, targetMaterial);
            mesh.position.set(pos.x, pos.y, wallZ); 
            mesh.scale.set(0, 0, 0);
            mesh.userData.gridIndex = chosenSlot;
            
            scene.add(mesh);
            targets.push(mesh);
        }

        // --- 카메라 컨트롤 & 판정 ---
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== container) return;
            const sensitivity = parseFloat(document.getElementById('sensitivity').value) || 0.3;
            
            const finalRotX = e.movementX * VALORANT_YAW_RADIAN * sensitivity;
            const finalRotY = e.movementY * VALORANT_YAW_RADIAN * sensitivity;
            
            camera.rotation.y -= finalRotX;
            camera.rotation.x -= finalRotY;
            camera.rotation.x = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, camera.rotation.x));
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === container) {
                menuOverlay.style.opacity = '0';
                setTimeout(() => { menuOverlay.style.display = 'none'; }, 300);
                
                if(!isPlaying) {
                    startNewGame();
                } else {
                    resumeGame(); 
                }
            } else {
                menuOverlay.style.display = 'flex';
                setTimeout(() => { menuOverlay.style.opacity = '1'; }, 10);
                if(isPlaying) pauseGame();
            }
        });

        const raycaster = new THREE.Raycaster();
        const centerPoint = new THREE.Vector2(0, 0); 

        window.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== container || !isPlaying) return;
            if (e.button !== 0) return; 

            totalClicks++;
            raycaster.setFromCamera(centerPoint, camera);
            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                hits++;
                score += 100;
                playHitSound(); 
                
                const hitTarget = intersects[0].object;
                lastDestroyedPosition = hitTarget.userData.gridIndex;
                activeGridPositions = activeGridPositions.filter(idx => idx !== lastDestroyedPosition);
                
                scene.remove(hitTarget);
                targets.splice(targets.indexOf(hitTarget), 1);
                
                spawnTarget();
            } else {
                if(score > 0) score = Math.max(0, score - 20); 
            }
            updateHUD();
        });

        function updateHUD() {
            scoreValue.innerText = score;
            timeValue.innerText = timeLeft.toFixed(1);
            finalAcc = totalClicks === 0 ? 100 : Math.round((hits / totalClicks) * 100);
            accuracyValue.innerText = finalAcc + '%';
        }

        // --- 게임 사이클 로직 ---
        function startNewGame() {
            isPlaying = true;
            score = 0; hits = 0; totalClicks = 0; timeLeft = 60.0; finalAcc = 100;
            
            activeDifficulty = document.querySelector('input[name="difficulty"]:checked').value;
            const targetSize = TARGET_SIZES[activeDifficulty];
            targetGeometry = new THREE.PlaneGeometry(targetSize, targetSize);
            
            camera.rotation.set(0, 0, 0); 
            targets.forEach(t => scene.remove(t));
            targets.length = 0; activeGridPositions = []; lastDestroyedPosition = -1;
            
            for(let i=0; i<3; i++) spawnTarget();
            updateHUD();

            if(gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft -= 0.1;
                if(timeLeft <= 0) { timeLeft = 0; endGame(); }
                updateHUD();
            }, 100);
        }

        function pauseGame() {
            clearInterval(gameTimer);
            menuTitle.innerText = "GAME PAUSED";
            startBtn.innerText = "게임 재개 (RESUME)";
            registerGroup.style.display = 'none'; 
        }

        function resumeGame() {
            if(gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft -= 0.1;
                if(timeLeft <= 0) { timeLeft = 0; endGame(); }
                updateHUD();
            }, 100);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            document.exitPointerLock();
            
            menuTitle.innerText = "TIME UP!";
            startBtn.innerText = "다시 시작 (RESTART)";
            resScore.innerText = score;
            resHits.innerText = hits;
            resAcc.innerText = finalAcc + '%';
            
            resultBoard.style.display = 'block';
            registerGroup.style.display = 'block'; 
            registerBtn.disabled = false;
            nicknameInput.value = '';
            
            targets.forEach(t => scene.remove(t));
            targets.length = 0; activeGridPositions = [];
            
            document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.lb-tab[data-target-diff="${activeDifficulty}"]`).classList.add('active');
            viewDifficulty = activeDifficulty;
            fetchAndRenderLeaderboard();
        }

        startBtn.addEventListener('click', () => { container.requestPointerLock(); });
        window.addEventListener('resize', () => { updateCameraFOV(); renderer.setSize(window.innerWidth, window.innerHeight); });

        function animate() {
            requestAnimationFrame(animate);
            targets.forEach(t => {
                if(t.scale.x < 1) { t.scale.x += 0.25; t.scale.y += 0.25; t.scale.z += 0.25; }
            });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D FPS Gridshot - Ultimate Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Pretendard', sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background-color: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; display: none; }
        #hud { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 24px; pointer-events: none; text-shadow: 2px 2px 0 #000; z-index: 100; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 999; }
        .box { background: #222; padding: 30px; border-radius: 15px; border: 2px solid #444; text-align: center; width: 350px; }
        h1 { margin-top: 0; color: #00ffcc; }
        input { padding: 12px; width: 85%; border: 1px solid #555; border-radius: 5px; background: #111; color: white; text-align: center; font-size: 16px; margin: 10px 0; }
        button { padding: 12px; margin-top: 10px; cursor: pointer; background: #ff3366; color: white; border: none; border-radius: 8px; font-weight: bold; width: 100%; font-size: 15px; transition: 0.2s; }
        button:hover { background: #ff5588; }
        .sound-btn-group { display: flex; gap: 10px; margin: 15px 0; }
        .sound-btn-group label { flex: 1; padding: 10px; border: 1px solid #555; border-radius: 5px; cursor: pointer; font-size: 13px; background: #333; }
        .sound-btn-group input { display: none; }
        .sound-btn-group input:checked + label { background: #ff3366; border-color: #ff3366; }
        #leaderboard { margin-top: 20px; font-size: 14px; color: #ccc; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="hud">SCORE: <span id="score">0</span> | TIME: <span id="timer">60</span></div>
    
    <div id="menu">
        <div class="box">
            <h1 id="menuTitle">GRIDSHOT 3D</h1>
            <div id="inputArea">
                <input type="text" id="playerName" placeholder="닉네임 입력 (20자 이내)" maxlength="20">
            </div>
            
            <div id="settingsArea">
                <label>감도: <input type="number" id="sens" value="0.35" step="0.001" style="width: 60px;"></label>
                <div class="sound-btn-group" id="soundArea">
                    <input type="radio" name="soundType" id="s1" value="default" checked><label for="s1">기본음</label>
                    <input type="radio" name="soundType" id="s2" value="custom"><label for="s2">띵~음</label>
                </div>
            </div>

            <div id="startArea"><button id="startBtn">START GAME</button></div>
            <div id="resumeArea" style="display:none;"><button id="resumeBtn" style="background:#00ffcc; color:#000;">RESUME</button></div>
            
            <div id="endArea" style="display:none;">
                <button id="btnRegister">랭킹 등록하기</button>
                <button id="btnRestart" style="background:#444;">다시 시작하기</button>
            </div>
            <div id="leaderboard"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.139.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.139.2/examples/js/controls/PointerLockControls.js"></script>
    <script>
        const defaultSound = new Audio('https://github.com/kmjgit/For-Yunene/raw/refs/heads/main/%EA%B8%B0%EB%B3%B8%20%ED%91%9C%EC%A0%81%20%ED%9A%A8%EA%B3%BC.mp3');
        const customSound = new Audio('https://github.com/kmjgit/For-Yunene/raw/refs/heads/main/%EC%9C%A0%EB%84%A4%EB%84%A4%20%EB%9D%B5.MP3');

        let camera, scene, renderer, controls, targets = [], score = 0, lastRemovedIndex = -1, timeLeft = 60, gameActive = false, isPaused = false, timerInterval = null;

        const gridPositions = [{x: -1.8, y: 1.8, z: -5}, {x: 0, y: 1.8, z: -5}, {x: 1.8, y: 1.8, z: -5}, {x: -1.8, y: 0, z: -5}, {x: 0, y: 0, z: -5}, {x: 1.8, y: 0, z: -5}, {x: -1.8, y: -1.8, z: -5}, {x: 0, y: -1.8, z: -5}, {x: 1.8, y: -1.8, z: -5}];
        const targetGeometry = new THREE.PlaneGeometry(0.8, 0.8);
        const texture = new THREE.TextureLoader().load('https://i.ibb.co/yn9FDhkc/2-1-removebg-preview.png');
        const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });

        scene = new THREE.Scene(); scene.background = new THREE.Color(0x1a1a1a);
        camera = new THREE.PerspectiveCamera(80, window.innerWidth/window.innerHeight, 0.1, 100);
        renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight); document.body.appendChild(renderer.domElement);
        controls = new THREE.PointerLockControls(camera, document.body);

        function applySens() { controls.pointerSpeed = parseFloat(document.getElementById('sens').value) * 1.5; }
        
        document.getElementById('startBtn').onclick = async () => { defaultSound.play(); defaultSound.pause(); customSound.play(); customSound.pause(); applySens(); await document.body.requestPointerLock(); startGame(); };
        document.getElementById('resumeBtn').onclick = async () => { applySens(); await document.body.requestPointerLock(); };

        controls.addEventListener('lock', () => { document.getElementById('menu').style.display = 'none'; if(isPaused) { isPaused = false; timerInterval = setInterval(timerTick, 1000); } });
        controls.addEventListener('unlock', () => { if(gameActive) { clearInterval(timerInterval); isPaused = true; document.getElementById('menu').style.display = 'flex'; document.getElementById('startArea').style.display = 'none'; document.getElementById('resumeArea').style.display = 'block'; } });

        function timerTick() { timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft <= 0) endGame(); }
        
        window.addEventListener('mousedown', (e) => {
            if (!controls.isLocked || !gameActive) return;
            const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = ray.intersectObjects(targets);
            if (intersects.length > 0) {
                const sound = document.querySelector('input[name="soundType"]:checked').value === 'custom' ? customSound : defaultSound;
                sound.currentTime = 0; sound.volume = document.getElementById('volRange').value; sound.play().catch(()=>{});
                scene.remove(intersects[0].object); targets.splice(targets.indexOf(intersects[0].object), 1);
                score += 100; document.getElementById('score').innerText = score; spawn();
            }
        });

        function spawn() {
            const t = new THREE.Mesh(targetGeometry, material);
            const pos = gridPositions[Math.floor(Math.random() * gridPositions.length)];
            t.position.set(pos.x, pos.y, pos.z); scene.add(t); targets.push(t);
        }

        function startGame() { score = 0; timeLeft = 60; gameActive = true; document.getElementById('score').innerText = score; document.getElementById('timer').innerText = timeLeft; targets.forEach(t => scene.remove(t)); targets = []; for(let i=0; i<3; i++) spawn(); timerInterval = setInterval(timerTick, 1000); }
        
        function endGame() { 
            gameActive = false; clearInterval(timerInterval); document.exitPointerLock(); 
            document.getElementById('menuTitle').innerText = "GAME OVER: " + score + "점";
            document.getElementById('menu').style.display = 'flex'; 
            document.getElementById('startArea').style.display = 'none';
            document.getElementById('resumeArea').style.display = 'none';
            document.getElementById('endArea').style.display = 'block';
            document.getElementById('settingsArea').style.display = 'none';
            document.getElementById('soundArea').style.display = 'none';
            document.getElementById('inputArea').style.display = 'block';
        }

        document.getElementById('btnRegister').onclick = () => { 
            let data = JSON.parse(localStorage.getItem('gridshot_rankings') || '[]'); 
            data.push({ name: document.getElementById('playerName').value || "익명", score: score, time: Date.now() }); 
            localStorage.setItem('gridshot_rankings', JSON.stringify(data)); updateLeaderboard(); resetMenu(); 
        };
        
        document.getElementById('btnRestart').onclick = resetMenu;

        function resetMenu() { 
            document.getElementById('menuTitle').innerText = "GRIDSHOT 3D";
            document.getElementById('endArea').style.display = 'none';
            document.getElementById('startArea').style.display = 'block';
            document.getElementById('settingsArea').style.display = 'block';
            document.getElementById('soundArea').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'block';
            updateLeaderboard();
        }

        function updateLeaderboard() { 
            let data = JSON.parse(localStorage.getItem('gridshot_rankings') || '[]');
            data.sort((a,b) => b.score - a.score);
            document.getElementById('leaderboard').innerHTML = "<h4>TOP 5 RANKING</h4>" + data.slice(0,5).map((e, i) => `${i+1}위: ${e.name} (${e.score}점)`).join('<br>'); 
        }
        
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); } 
        animate();
    </script>
</body>
</html>
